name: build-and-push

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      push:
        description: 'Push to Docker Hub'
        required: false
        default: 'false'

env:
  REGISTRY: docker.io
  IMAGE_NAME: baselineai/llama-rocmfpx-strix

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - fedora-43
          - ubuntu-24-04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') || github.event.inputs.push == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build (and push on tag)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Containerfile.${{ matrix.target }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.target }}
            ${{ matrix.target == 'fedora-43' && format('{0}/{1}:latest', env.REGISTRY, env.IMAGE_NAME) || '' }}
          platforms: linux/amd64
          push: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') || github.event.inputs.push == 'true' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
